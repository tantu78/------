<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发起活动 - 校园约球平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .create-container {
            max-width: 800px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .form-card {
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--airbnb-gray);
            margin-bottom: 32px;
        }

        .form-section {
            margin-bottom: 32px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--airbnb-border);
        }

        .form-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: var(--airbnb-red);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-label .required {
            color: var(--airbnb-red);
            margin-left: 4px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--airbnb-red);
        }

        .form-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        .location-select {
            display: flex;
            gap: 8px;
        }

        .location-select button {
            white-space: nowrap;
        }

        .upload-area {
            border: 2px dashed var(--airbnb-border);
            border-radius: 8px;
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--airbnb-bg);
        }

        .upload-area:hover {
            border-color: var(--airbnb-red);
            background: rgba(255, 90, 95, 0.05);
        }

        .upload-area i {
            font-size: 48px;
            color: var(--airbnb-gray);
            margin-bottom: 16px;
        }

        .upload-area p {
            color: var(--airbnb-gray);
            margin-bottom: 8px;
        }

        .upload-area small {
            color: var(--airbnb-gray);
            opacity: 0.7;
        }

        .form-actions {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 32px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .map-modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .map-modal-content {
            background: white; border-radius: 12px; width: 90vw; max-width: 900px;
            max-height: 85vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .map-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid var(--airbnb-border);
        }
        .map-modal-header h3 { font-size: 18px; font-weight: 600; }
        .map-modal-close {
            background: none; border: none; font-size: 24px; cursor: pointer;
            color: var(--airbnb-gray); padding: 4px 8px;
        }
        .map-modal-close:hover { color: var(--airbnb-red); }
        .map-modal-body {
            flex: 1; overflow: auto; padding: 16px; background: #f5f5f5;
            position: relative; display: flex; justify-content: center;
        }
        .map-modal-body > div {
            position: relative; display: inline-block;
        }
        .map-modal-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; border-top: 1px solid var(--airbnb-border);
        }
        .map-modal-body .map-marker {
            position: absolute; width: 20px; height: 20px;
            background: var(--airbnb-red); border: 3px solid white;
            border-radius: 50%; transform: translate(-50%, -50%);
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.25); z-index: 10;
            transition: transform 0.2s;
        }
        .map-modal-body .map-marker:hover { transform: translate(-50%, -50%) scale(1.3); }
        .map-modal-body .map-marker.selected {
            background: var(--airbnb-teal); border-color: var(--airbnb-teal);
            transform: translate(-50%, -50%) scale(1.4);
        }
        .map-modal-body .map-marker-label {
            position: absolute; transform: translate(-50%, -130%);
            background: rgba(0,0,0,0.78); color: white; padding: 2px 8px;
            border-radius: 4px; font-size: 11px; white-space: nowrap;
            pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <i class="fa fa-basketball-ball"></i>
                <span>校园约球</span>
            </a>
            
            <div class="search-bar">
                <i class="fa fa-search" style="color: var(--airbnb-gray);"></i>
                <input type="text" placeholder="搜索运动类型、场地、活动...">
            </div>
            
            <div class="nav-right">
                <a href="login.html" class="btn-secondary nav-login" style="padding: 8px 16px; font-size: 14px;">登录</a>
                <a href="register.html" class="btn-primary nav-register" style="padding: 8px 16px; font-size: 14px;">注册</a>
                <a href="create-activity.html" class="btn-primary" style="padding: 8px 16px; font-size: 14px; display: none; background: var(--airbnb-teal);">
                    <i class="fa fa-plus mr-1"></i> 发起活动
                </a>
                <div class="notification-icon" style="display: none;">
                    <i class="fa fa-bell"></i>
                    <span class="notification-badge">0</span>
                </div>
                <a href="profile.html" class="user-avatar" style="display: none;">
                    <i class="fa fa-user" style="color: var(--airbnb-gray);"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="create-container">
        <div style="margin-top: 24px;">
            <a href="index.html" style="color: var(--airbnb-gray); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 16px;">
                <i class="fa fa-arrow-left"></i>
                <span>返回首页</span>
            </a>
        </div>

        <h1 class="page-title">发起新活动</h1>
        <p class="page-subtitle">填写活动信息，邀请同学一起运动吧</p>

        <div class="form-card">
            <form>
                <!-- 基本信息 -->
                <div class="form-section">
                    <h3 class="section-title">
                        <i class="fa fa-info-circle"></i>
                        基本信息
                    </h3>

                    <div class="form-group">
                        <label class="form-label">活动标题 <span class="required">*</span></label>
                        <input type="text" id="act-title" class="form-input" placeholder="例如：西校区篮球场3v3组队" required>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">运动类型 <span class="required">*</span></label>
                            <select id="act-sport-type" class="form-select" required>
                                <option value="">请选择运动类型</option>
                                <option value="basketball">篮球</option>
                                <option value="badminton">羽毛球</option>
                                <option value="pingpong">乒乓球</option>
                                <option value="football">足球</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">最大参与人数 <span class="required">*</span></label>
                            <input type="number" id="act-max-participants" class="form-input" min="2" max="100" value="8" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">活动描述</label>
                        <textarea id="act-description" class="form-textarea" placeholder="介绍一下活动的具体内容、要求、注意事项等..."></textarea>
                    </div>
                </div>

                <!-- 时间地点 -->
                <div class="form-section">
                    <h3 class="section-title">
                        <i class="fa fa-map-marker"></i>
                        时间与地点
                    </h3>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">开始时间 <span class="required">*</span></label>
                            <input type="datetime-local" id="act-start-time" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">结束时间 <span class="required">*</span></label>
                            <input type="datetime-local" id="act-end-time" class="form-input" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">活动地点 <span class="required">*</span></label>
                        <div style="display: flex; gap: 8px; align-items: flex-end;">
                            <select id="act-venue" class="form-input" required style="flex: 1;">
                                <option value="">请选择活动场地</option>
                            </select>
                            <button type="button" class="btn-secondary" onclick="openMapVenueSelector()" style="white-space: nowrap; padding: 10px 14px;">
                                <i class="fa fa-map-marker"></i> 地图选点
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 封面图片 -->
                <div class="form-section">
                    <h3 class="section-title">
                        <i class="fa fa-image"></i>
                        活动封面
                    </h3>

                    <div class="upload-area" onclick="document.getElementById('cover-upload').click()">
                        <i class="fa fa-cloud-upload"></i>
                        <p>点击上传活动封面图片</p>
                        <small>支持 JPG、PNG 格式，建议尺寸 1200x800</small>
                        <input type="file" id="cover-upload" accept="image/*" style="display: none;">
                    </div>
                </div>

                <!-- 更多设置 -->
                <div class="form-section">
                    <h3 class="section-title">
                        <i class="fa fa-cog"></i>
                        更多设置
                    </h3>

                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" id="act-is-public" checked>
                            <span>公开活动，所有人可见</span>
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">
                        取消
                    </button>
                    <button type="button" class="btn-primary" onclick="createActivity()">
                        发布活动
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div class="map-modal-overlay" id="map-modal" style="display:none;" onclick="closeMapVenueSelector(event)">
        <div class="map-modal-content" onclick="event.stopPropagation()">
            <div class="map-modal-header">
                <h3><i class="fa fa-map-marker"></i> 在地图上选择场地</h3>
                <button class="map-modal-close" onclick="closeMapVenueSelector()">&times;</button>
            </div>
            <div class="map-modal-body" id="venue-map-container">
                <img src="学校地图.png" alt="校园地图" id="venue-map-img" style="width:100%;display:block;">
            </div>
            <div class="map-modal-footer">
                <span id="map-selected-name" style="color: var(--airbnb-gray);">点击地图上的标记选择场地</span>
                <button type="button" class="btn-primary" id="map-confirm-btn" onclick="confirmMapVenue()" disabled>确认选择</button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="container footer-content">
            <p>© 2025 校园约球平台 · 让运动更简单</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        var allVenues = [];

        function loadVenueOptions() {
            API.venue.list().then(function(res) {
                if (res.code === 200 && res.data) {
                    allVenues = res.data;
                    var select = document.getElementById('act-venue');
                    res.data.forEach(function(v) {
                        var opt = document.createElement('option');
                        opt.value = v.id;
                        opt.textContent = v.name + ' (' + sportLabel(v.sportType) + ')';
                        select.appendChild(opt);
                    });
                }
            });
        }

        function openMapVenueSelector() {
            var modal = document.getElementById('map-modal');
            modal.style.display = 'flex';
            renderMapVenueMarkers();
        }

        function closeMapVenueSelector(e) {
            if (e && e.target !== document.getElementById('map-modal')) return;
            var modal = document.getElementById('map-modal');
            modal.style.display = 'none';
        }

        var mapSelectedVenueId = null;

        function renderMapVenueMarkers() {
            var container = document.getElementById('venue-map-container');
            container.querySelectorAll('.map-marker, .map-marker-label').forEach(function(el) { el.remove(); });

            var img = document.getElementById('venue-map-img');
            if (!img.complete) {
                img.onload = function() { renderMapVenueMarkers(); };
                return;
            }

            allVenues.forEach(function(v) {
                if (v.mapX == null || v.mapY == null) return;

                var px = v.mapX / 100;
                var py = v.mapY / 100;

                var marker = document.createElement('div');
                marker.className = 'map-marker';
                marker.setAttribute('data-venue-id', v.id);
                marker.style.left = px + '%';
                marker.style.top = py + '%';
                marker.title = v.name;
                marker.addEventListener('click', function() {
                    selectMapVenue(v);
                });
                container.appendChild(marker);

                var label = document.createElement('div');
                label.className = 'map-marker-label';
                label.style.left = px + '%';
                label.style.top = py + '%';
                label.textContent = v.name;
                container.appendChild(label);
            });
        }

        function selectMapVenue(venue) {
            mapSelectedVenueId = venue.id;

            var container = document.getElementById('venue-map-container');
            container.querySelectorAll('.map-marker').forEach(function(m) {
                m.classList.toggle('selected', m.getAttribute('data-venue-id') === String(venue.id));
            });

            document.getElementById('map-selected-name').textContent = venue.name + ' (' + sportLabel(venue.sportType) + ')';
            document.getElementById('map-confirm-btn').disabled = false;
        }

        function confirmMapVenue() {
            if (!mapSelectedVenueId) return;
            document.getElementById('act-venue').value = mapSelectedVenueId;
            document.getElementById('map-modal').style.display = 'none';
            mapSelectedVenueId = null;
        }

        function createActivity() {
            var user = requireAuth();
            if (!user) return;

            var title = document.getElementById('act-title').value;
            var sportType = document.getElementById('act-sport-type').value;
            var maxParticipants = parseInt(document.getElementById('act-max-participants').value);
            var description = document.getElementById('act-description').value;
            var startTime = document.getElementById('act-start-time').value;
            var endTime = document.getElementById('act-end-time').value;
            var venueId = document.getElementById('act-venue').value;
            var isPublic = document.getElementById('act-is-public').checked;

            if (!title || !sportType || !startTime || !endTime || !venueId) {
                showToast('请填写所有必填项', 'error');
                return;
            }

            var activity = {
                title: title,
                sportType: sportType,
                maxParticipants: maxParticipants,
                description: description,
                startTime: startTime + ':00',
                endTime: endTime + ':00',
                venueId: parseInt(venueId),
                isPublic: isPublic
            };

            var btn = document.querySelector('.btn-primary');
            btn.disabled = true;
            btn.textContent = '发布中...';

            API.activity.create(activity).then(function(res) {
                btn.disabled = false;
                btn.textContent = '发布活动';
                if (res.code === 200) {
                    showToast('活动发布成功！', 'success');
                    setTimeout(function() {
                        window.location.href = 'activity-detail.html?id=' + res.data.id;
                    }, 500);
                } else {
                    showToast(res.message || '发布失败', 'error');
                }
            }).catch(function() {
                btn.disabled = false;
                btn.textContent = '发布活动';
                showToast('网络错误', 'error');
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadVenueOptions();
        });
    </script>
</body>
</html>
