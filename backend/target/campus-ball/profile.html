<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 校园约球平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 32px;
            margin: 32px 0;
        }

        .sidebar-card {
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 88px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--airbnb-border);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--airbnb-bg);
            border: 2px solid var(--airbnb-red);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--airbnb-gray);
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .profile-favorite {
            font-size: 14px;
            color: var(--airbnb-gray);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 4px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--airbnb-dark);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: var(--airbnb-bg);
            color: var(--airbnb-red);
        }

        .sidebar-menu i {
            width: 16px;
            text-align: center;
        }

        .content-card {
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .content-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .tab-nav {
            display: flex;
            gap: 32px;
            border-bottom: 1px solid var(--airbnb-border);
            margin-bottom: 24px;
        }

        .tab-nav a {
            padding-bottom: 12px;
            text-decoration: none;
            color: var(--airbnb-gray);
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-nav a.active {
            color: var(--airbnb-red);
            border-color: var(--airbnb-red);
        }

        .empty-state {
            text-align: center;
            padding: 48px 0;
            color: var(--airbnb-gray);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            text-align: center;
            padding: 24px;
            background: var(--airbnb-bg);
            border-radius: 12px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--airbnb-red);
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--airbnb-gray);
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--airbnb-red);
        }

        .form-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .sport-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sport-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            user-select: none;
        }

        .sport-checkbox:hover {
            border-color: var(--airbnb-red);
            background: rgba(255, 90, 95, 0.03);
        }

        .sport-checkbox input {
            display: none;
        }

        .sport-checkbox.selected {
            border-color: var(--airbnb-red);
            background: rgba(255, 90, 95, 0.08);
            color: var(--airbnb-red);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="container nav-content">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    <i class="fa fa-basketball-ball"></i>
                    <span>校园约球</span>
                </a>
                <div class="nav-sport-tabs">
                    <a href="index.html" class="nav-sport-item">全部</a>
                    <a href="index.html?type=basketball" class="nav-sport-item">篮球</a>
                    <a href="index.html?type=badminton" class="nav-sport-item">羽毛球</a>
                    <a href="index.html?type=pingpong" class="nav-sport-item">乒乓球</a>
                    <a href="index.html?type=football" class="nav-sport-item">足球</a>
                </div>
            </div>

            <div class="nav-right">
                <a href="map.html" class="btn-secondary" style="padding: 6px 14px; font-size: 13px;">
                    <i class="fa fa-map-marker" style="margin-right:4px;"></i>按位置筛选
                </a>
                <a href="login.html" class="btn-secondary nav-login" style="padding: 6px 14px; font-size: 13px;">登录</a>
                <a href="create-activity.html" class="btn-primary" style="padding: 6px 14px; font-size: 13px; display: none;">
                    <i class="fa fa-plus" style="margin-right:4px;"></i>发起活动
                </a>
                <a href="register.html" class="btn-primary nav-register" style="padding: 6px 14px; font-size: 13px;">注册</a>
                <a href="profile.html" class="user-avatar" style="display: none; border-color: var(--airbnb-red);">
                    <i class="fa fa-user" style="color: var(--airbnb-gray);"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="container">
        <div class="profile-container">
            <!-- 侧边栏 -->
            <div class="sidebar-card">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <i class="fa fa-user"></i>
                    </div>
                    <div class="profile-name" id="profile-name">未登录</div>
                    <div class="profile-favorite" id="profile-favorite">喜好：未知</div>
                </div>

                <ul class="sidebar-menu">
                    <li>
                        <a href="#activities" class="active" onclick="switchTab('activities')">
                            <i class="fa fa-calendar"></i>
                            <span>我的活动</span>
                        </a>
                    </li>
                    <li>
                        <a href="#friends" onclick="switchTab('friends')">
                            <i class="fa fa-users"></i>
                            <span>我的好友</span>
                        </a>
                    </li>
                    <li>
                        <a href="#stats" onclick="switchTab('stats')">
                            <i class="fa fa-bar-chart"></i>
                            <span>运动统计</span>
                        </a>
                    </li>
                    <li>
                        <a href="#settings" onclick="switchTab('settings')">
                            <i class="fa fa-cog"></i>
                            <span>账号设置</span>
                        </a>
                    </li>
                    <li style="margin-top: 16px;">
                        <a href="#" onclick="logout()" style="color: #ef4444;">
                            <i class="fa fa-sign-out"></i>
                            <span>退出登录</span>
                        </a>
                    </li>
                </ul>
            </div>

            <!-- 内容区 -->
            <div>
                <!-- 我的活动 -->
                <div class="content-card" id="activities-tab">
                    <h2 class="content-title">我的活动</h2>
                    <div class="activities-grid" id="my-activities">
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <i class="fa fa-spinner fa-spin"></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>

                <!-- 我的好友 -->
                <div class="content-card" id="friends-tab" style="display: none;">
                    <h2 class="content-title">我的好友</h2>
                    
                    <div style="margin-bottom: 24px;">
                        <button class="btn-primary">
                            <i class="fa fa-plus mr-2"></i> 添加好友
                        </button>
                    </div>

                    <div style="display: grid; gap: 16px;">
                        <div style="display: flex; align-items: center; justify-content: space-between; padding: 16px; border: 1px solid var(--airbnb-border); border-radius: 8px;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--airbnb-bg); display: flex; align-items: center; justify-content: center;">
                                    <i class="fa fa-user" style="color: var(--airbnb-gray);"></i>
                                </div>
                                <div>
                                    <div style="font-weight: 500;">李四</div>
                                    <div style="font-size: 14px; color: var(--airbnb-gray);">共同参与3场活动</div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn-secondary" style="padding: 8px 16px; font-size: 14px;">
                                    <i class="fa fa-comment mr-2"></i> 发消息
                                </button>
                                <button class="btn-secondary" style="padding: 8px 16px; font-size: 14px;">
                                    <i class="fa fa-share mr-2"></i> 推荐活动
                                </button>
                            </div>
                        </div>

                        <div style="display: flex; align-items: center; justify-content: space-between; padding: 16px; border: 1px solid var(--airbnb-border); border-radius: 8px;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--airbnb-bg); display: flex; align-items: center; justify-content: center;">
                                    <i class="fa fa-user" style="color: var(--airbnb-gray);"></i>
                                </div>
                                <div>
                                    <div style="font-weight: 500;">王五</div>
                                    <div style="font-size: 14px; color: var(--airbnb-gray);">共同参与2场活动</div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn-secondary" style="padding: 8px 16px; font-size: 14px;">
                                    <i class="fa fa-comment mr-2"></i> 发消息
                                </button>
                                <button class="btn-secondary" style="padding: 8px 16px; font-size: 14px;">
                                    <i class="fa fa-share mr-2"></i> 推荐活动
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 运动统计 -->
                <div class="content-card" id="stats-tab" style="display: none;">
                    <h2 class="content-title">我的运动统计</h2>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">12</div>
                            <div class="stat-label">参与活动</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">3</div>
                            <div class="stat-label">发起活动</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">36</div>
                            <div class="stat-label">运动时长(小时)</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">8</div>
                            <div class="stat-label">好友人数</div>
                        </div>
                    </div>

                    <div style="height: 300px; background: var(--airbnb-bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--airbnb-gray);">
                        <span>运动趋势图表占位</span>
                    </div>
                </div>

                <div class="content-card" id="settings-tab" style="display: none;">
                    <h2 class="content-title">账号设置</h2>

                    <form>
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">用户名</label>
                                <input type="text" id="set-username" class="form-input" readonly>
                            </div>
                            <div class="form-group">
                                <label class="form-label">手机号</label>
                                <input type="tel" id="set-phone" class="form-input">
                            </div>
                            <div class="form-group" style="grid-column: 1 / -1;">
                                <label class="form-label">喜好的运动类型（可多选）</label>
                                <div class="sport-checkboxes" id="set-sport-checkboxes">
                                    <label class="sport-checkbox"><input type="checkbox" name="set-favorite" value="basketball"> <i class="fa fa-basketball-ball"></i> 篮球</label>
                                    <label class="sport-checkbox"><input type="checkbox" name="set-favorite" value="badminton"> <i class="fa fa-table-tennis"></i> 羽毛球</label>
                                    <label class="sport-checkbox"><input type="checkbox" name="set-favorite" value="pingpong"> <i class="fa fa-table-tennis-paddle-ball"></i> 乒乓球</label>
                                    <label class="sport-checkbox"><input type="checkbox" name="set-favorite" value="football"> <i class="fa fa-futbol"></i> 足球</label>
                                    <label class="sport-checkbox"><input type="checkbox" name="set-favorite" value="other"> <i class="fa fa-ellipsis-h"></i> 其他</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">个人简介</label>
                            <textarea id="set-description" class="form-textarea" placeholder="介绍一下自己吧..."></textarea>
                        </div>

                        <button type="button" class="btn-primary" onclick="saveProfile()">
                            保存修改
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer>
        <div class="container footer-content">
            <p>© 2025 校园约球平台 · 让运动更简单</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        var currentProfileUser = null;

        function switchTab(tabName) {
            document.querySelectorAll('[id$="-tab"]').forEach(function(tab) {
                tab.style.display = 'none';
            });
            document.querySelectorAll('.sidebar-menu a').forEach(function(link) {
                link.classList.remove('active');
            });
            document.getElementById(tabName + '-tab').style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        function initSportCheckboxes() {
            var boxes = document.querySelectorAll('.sport-checkbox');
            boxes.forEach(function(box) {
                box.addEventListener('click', function() {
                    var cb = this.querySelector('input');
                    cb.checked = !cb.checked;
                    this.classList.toggle('selected', cb.checked);
                });
            });
        }

        function setFavoriteCheckboxes(favoriteSport) {
            if (!favoriteSport) return;
            var values = favoriteSport.split(',').map(function(s) { return s.trim(); });
            values.forEach(function(v) {
                var cb = document.querySelector('input[name="set-favorite"][value="' + v + '"]');
                if (cb) {
                    cb.checked = true;
                    cb.closest('.sport-checkbox').classList.add('selected');
                }
            });
        }

        function getFavoriteFromCheckboxes() {
            var checked = document.querySelectorAll('input[name="set-favorite"]:checked');
            var values = [];
            checked.forEach(function(cb) { values.push(cb.value); });
            return values.length > 0 ? values.join(',') : null;
        }

        function loadProfile() {
            var user = requireAuth();
            if (!user) return;
            currentProfileUser = user;

            document.getElementById('profile-name').textContent = user.username || '未知';
            document.getElementById('profile-favorite').textContent = '喜好：' + sportLabel(user.favoriteSport);

            document.getElementById('set-username').value = user.username || '';
            document.getElementById('set-phone').value = user.phone || '';
            document.getElementById('set-description').value = user.description || '';
            setFavoriteCheckboxes(user.favoriteSport);

            loadMyActivities();
        }

        function loadMyActivities() {
            var container = document.getElementById('my-activities');
            API.activity.my().then(function(res) {
                if (res.code === 200 && res.data) {
                    var activities = res.data;
                    if (activities.length === 0) {
                        container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><i class="fa fa-calendar"></i><p>还没有参与任何活动</p><a href="index.html" class="btn-primary" style="display: inline-block; margin-top: 12px;">去看看活动</a></div>';
                        return;
                    }
                    container.innerHTML = activities.map(function(a) { return activityCardHtml(a); }).join('');
                }
            });
        }

        function saveProfile() {
            if (!currentProfileUser) return;

            var updated = {
                username: currentProfileUser.username,
                phone: document.getElementById('set-phone').value,
                favoriteSport: getFavoriteFromCheckboxes(),
                description: document.getElementById('set-description').value
            };

            var btn = document.querySelector('#settings-tab .btn-primary');
            btn.disabled = true;
            btn.textContent = '保存中...';

            API.user.update(updated).then(function(res) {
                btn.disabled = false;
                btn.textContent = '保存修改';
                if (res.code === 200) {
                    setCurrentUser(res.data);
                    currentProfileUser = res.data;
                    document.getElementById('profile-name').textContent = res.data.username || '未知';
                    document.getElementById('profile-favorite').textContent = '喜好：' + sportLabel(res.data.favoriteSport);
                    setFavoriteCheckboxes(res.data.favoriteSport);
                    showToast('保存成功！', 'success');
                } else {
                    showToast(res.message || '保存失败', 'error');
                }
            }).catch(function() {
                btn.disabled = false;
                btn.textContent = '保存修改';
                showToast('网络错误', 'error');
            });
        }

        function logout() {
            if (!confirm('确定要退出登录吗？')) return;
            API.user.logout().then(function() {
                setCurrentUser(null);
                window.location.href = 'index.html';
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            initSportCheckboxes();
            loadProfile();
        });
    </script>
</body>
</html>
