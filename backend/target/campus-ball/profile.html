<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 校园约球平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 32px;
            margin: 32px 0;
        }

        .sidebar-card {
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 88px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--airbnb-border);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--airbnb-bg);
            border: 2px solid var(--airbnb-red);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--airbnb-gray);
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .profile-favorite {
            font-size: 14px;
            color: var(--airbnb-gray);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 4px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--airbnb-dark);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: var(--airbnb-bg);
            color: var(--airbnb-red);
        }

        .sidebar-menu i {
            width: 16px;
            text-align: center;
        }

        .content-card {
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .content-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .tab-nav {
            display: flex;
            gap: 32px;
            border-bottom: 1px solid var(--airbnb-border);
            margin-bottom: 24px;
        }

        .tab-nav a {
            padding-bottom: 12px;
            text-decoration: none;
            color: var(--airbnb-gray);
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-nav a.active {
            color: var(--airbnb-red);
            border-color: var(--airbnb-red);
        }

        .empty-state {
            text-align: center;
            padding: 48px 0;
            color: var(--airbnb-gray);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            text-align: center;
            padding: 24px;
            background: var(--airbnb-bg);
            border-radius: 12px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--airbnb-red);
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--airbnb-gray);
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--airbnb-red);
        }

        .form-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .sport-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sport-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            user-select: none;
        }

        .sport-checkbox:hover {
            border-color: var(--airbnb-red);
            background: rgba(255, 90, 95, 0.03);
        }

        .sport-checkbox input {
            display: none;
        }

        .sport-checkbox.selected {
            border-color: var(--airbnb-red);
            background: rgba(255, 90, 95, 0.08);
            color: var(--airbnb-red);
            font-weight: 500;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }

        .modal-dialog {
            background: #fff;
            border-radius: 20px;
            padding: 0;
            width: 480px;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-header { padding: 28px 32px 0; }
        .modal-header h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--airbnb-dark);
        }
        .modal-subtitle {
            font-size: 14px;
            color: var(--airbnb-gray);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .modal-body { padding: 24px 32px; }
        .modal-footer {
            padding: 0 32px 28px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .btn-cancel {
            background: var(--airbnb-bg);
            color: var(--airbnb-dark);
            border: none;
            padding: 10px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--airbnb-red) 0%, var(--airbnb-orange) 100%);
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .evaluation-target {
            background: var(--airbnb-bg);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .evaluation-target .target-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--airbnb-red), var(--airbnb-orange));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }
        .evaluation-target .target-name { font-weight: 600; font-size: 15px; }
        .evaluation-target .target-badge {
            font-size: 12px;
            color: var(--airbnb-red);
            background: rgba(255, 90, 95, 0.1);
            padding: 2px 10px;
            border-radius: 20px;
        }
        .score-preview {
            font-size: 14px;
            color: #f59e0b;
            margin-left: auto;
            min-width: 100px;
            text-align: right;
        }

        .score-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .score-row label {
            min-width: 80px;
            font-weight: 500;
            font-size: 15px;
        }
        .star-rating {
            display: flex;
            gap: 6px;
        }
        .star-rating .star {
            font-size: 32px;
            cursor: pointer;
            color: #d1d5db;
            transition: color 0.15s ease, transform 0.15s ease;
            user-select: none;
        }
        .star-rating .star:hover { transform: scale(1.15); }
        .star-rating .star.active { color: #f59e0b; }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--airbnb-border);
            border-radius: 10px;
            font-size: 14px;
            color: var(--airbnb-dark);
            background: #fff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            resize: vertical;
        }
        .form-input:focus {
            border-color: var(--airbnb-red);
            box-shadow: 0 0 0 3px rgba(255, 90, 95, 0.12);
        }
    </style>
</head>

            <div class="modal-footer">
                <button class="btn-cancel" onclick="profileCloseEvaluationModal()">取消</button>

            </div>
        </div>
    </div>

    <script src="js/api.js"></script>

    <script>
        var currentProfileUser = null;
        var profileEvalActivity = null;
        var profileActivityParticipants = [];
        var profileEvalSkillScore = 0;
        var profileEvalOrganizingScore = 0;
        var profileEvalTargetUserId = null;

        function switchTab(tabName) {
            document.querySelectorAll('[id$="-tab"]').forEach(function(tab) {
                tab.style.display = 'none';
            });
            document.querySelectorAll('.sidebar-menu a').forEach(function(link) {
                link.classList.remove('active');
            });
            document.getElementById(tabName + '-tab').style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        function initSportCheckboxes() {
            var boxes = document.querySelectorAll('.sport-checkbox');
            boxes.forEach(function(box) {
                box.addEventListener('click', function() {
                    var cb = this.querySelector('input');
                    cb.checked = !cb.checked;
                    this.classList.toggle('selected', cb.checked);
                });
            });
        }

        function setFavoriteCheckboxes(favoriteSport) {
            if (!favoriteSport) return;
            var values = favoriteSport.split(',').map(function(s) { return s.trim(); });
            values.forEach(function(v) {
                var cb = document.querySelector('input[name="set-favorite"][value="' + v + '"]');
                if (cb) {
                    cb.checked = true;
                    cb.closest('.sport-checkbox').classList.add('selected');
                }
            });
        }

        function getFavoriteFromCheckboxes() {
            var checked = document.querySelectorAll('input[name="set-favorite"]:checked');
            var values = [];
            checked.forEach(function(cb) { values.push(cb.value); });
            return values.length > 0 ? values.join(',') : null;
        }

        function loadProfile() {
            var user = requireAuth();
            if (!user) return;
            currentProfileUser = user;

            document.getElementById('profile-name').textContent = user.username || '未知';
            document.getElementById('profile-favorite').textContent = '喜好：' + sportLabel(user.favoriteSport);

            document.getElementById('set-username').value = user.username || '';
            document.getElementById('set-phone').value = user.phone || '';
            document.getElementById('set-description').value = user.description || '';
            setFavoriteCheckboxes(user.favoriteSport);

            loadMyActivities();
            loadStats();
        }

        function loadStats() {
            if (!currentProfileUser) return;

            // 加载参与活动数和发起活动数
            API.activity.my().then(function(res) {
                if (res.code === 200 && res.data) {
                    var activities = res.data;
                    var participated = activities.length;
                    var organized = activities.filter(function(a) { 
                        return a.organizerId === currentProfileUser.id; 
                    }).length;

                    document.getElementById('stat-participated-count').textContent = participated;
                    document.getElementById('stat-organized-count').textContent = organized;
                }
            });

            // 加载评分统计
            API.evaluation.getUserScore(currentProfileUser.id).then(function(res) {
                if (res.code === 200 && res.data) {
                    document.getElementById('stat-avg-skill-score').textContent = res.data.avgSkillScore || 0;
                    document.getElementById('stat-avg-organizing-score').textContent = res.data.avgOrganizingScore || 0;
                }
            });
        }

        function loadMyActivities() {
            var container = document.getElementById('my-activities');
            API.activity.my().then(function(res) {
                if (res.code === 200 && res.data) {
                    var activities = res.data;
                    if (activities.length === 0) {
                        container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><i class="fa fa-calendar"></i><p>还没有参与任何活动</p><a href="index.html" class="btn-primary" style="display: inline-block; margin-top: 12px;">去看看活动</a></div>';
                        return;
                    }
                    container.innerHTML = activities.map(function(a) { return profileActivityCardHtml(a); }).join('');
                }
            });
        }

        function isActivityEnded(a) {
            if (!a || !a.endTime) return false;
            var endTime = new Date(a.endTime);
            var now = new Date();
            return now >= endTime;
        }

        function profileActivityCardHtml(a) {
            var venueName = a.venueName || '未知场地';
            var organizerName = a.organizerName || '未知';
            var current = a.currentParticipants || 0;
            var max = a.maxParticipants || 0;
            var coverImg = a.coverImage || 'https://picsum.photos/seed/activity' + a.id + '/600/400';
            var isFull = current >= max;
            var badgeHtml = '';
            if (isFull) {
                badgeHtml = '<span class="activity-badge">已满</span>';
            } else if (max - current <= 2) {
                badgeHtml = '<span class="activity-badge" style="background: var(--airbnb-orange);">即将满员</span>';
            }

            var ended = isActivityEnded(a);

            return '<div class="card activity-card" style="cursor:default;">' +
                '<div class="activity-image" style="cursor:pointer;" onclick="window.location.href=\'activity-detail.html?id=' + a.id + '\'">' +
                    '<img src="' + coverImg + '" alt="' + a.title + '" style="width:100%;height:100%;object-fit:cover;">' +
                    badgeHtml +
                '</div>' +
                '<div class="activity-info">' +
                    '<div class="activity-time">' +
                        '<i class="fa fa-calendar"></i>' +
                        '<span>' + formatDateRange(a.startTime, a.endTime) + '</span>' +
                    '</div>' +
                    '<h3 class="activity-title" style="cursor:pointer;" onclick="window.location.href=\'activity-detail.html?id=' + a.id + '\'">' + a.title + '</h3>' +
                    '<div class="activity-location">' +
                        '<i class="fa fa-map-marker"></i>' +
                        '<span>' + venueName + '</span>' +
                    '</div>' +
                    '<div class="activity-meta">' +
                        '<div class="activity-participants">' +
                            '<i class="fa fa-users"></i>' +
                            '<span>' + current + '/' + max + '人</span>' +
                        '</div>' +
                        '<div class="activity-organizer">组织者：' + organizerName + '</div>' +
                    '</div>' +
                    '<div class="activity-actions">' +
                        (ended ? '<button class="btn-primary" onclick="profileOpenEvaluationModal(' + a.id + ')">评价</button>' : '') +
                        '<button class="btn-secondary" onclick="event.preventDefault(); window.location.href=\'activity-detail.html?id=' + a.id + '\'">详情</button>' +
                    '</div>' +
                '</div>' +
            '</div>';
        }

        function profileOpenEvaluationModal(activityId) {
            API.activity.detail(activityId).then(function(res) {
                if (res.code === 200 && res.data) {
                    profileEvalActivity = res.data;
                    profileLoadParticipants(activityId);
                }
            });
        }

        function profileLoadParticipants(activityId) {
            API.activity.participants(activityId).then(function(res) {
                if (res.code === 200 && res.data) {
                    profileActivityParticipants = res.data;
                    profilePopulateTargetSelect();
                    profileInitStarRating();
                    document.getElementById('profile-evaluation-modal').style.display = 'flex';
                }
            });
        }

        function profilePopulateTargetSelect() {
            var select = document.getElementById('profile-eval-target-select');
            var currentUser = getCurrentUser();
            var currentUserId = currentUser ? currentUser.id : null;

            var html = '<option value="">请选择评价对象</option>';

            profileActivityParticipants.forEach(function(p) {
                if (p.userId === currentUserId) return;
                var isOrganizer = profileEvalActivity && profileEvalActivity.organizerId === p.userId;
                html += '<option value="' + p.userId + '" data-is-organizer="' + isOrganizer + '">' + 
                    (p.username || '用户') + (isOrganizer ? ' (组织者)' : '') + '</option>';
            });

            select.innerHTML = html;
        }

        function profileOnTargetChange() {
            var select = document.getElementById('profile-eval-target-select');
            var selectedOption = select.options[select.selectedIndex];

            if (!selectedOption || !selectedOption.value) {
                profileEvalTargetUserId = null;
                document.getElementById('profile-eval-target-name').textContent = '选择评价对象';
                document.getElementById('profile-eval-target-badge').textContent = '参与者';
                return;
            }

            profileEvalTargetUserId = parseInt(selectedOption.value);
            var isOrganizer = selectedOption.dataset.isOrganizer === 'true';

            var targetUser = profileActivityParticipants.find(function(p) { return p.userId === profileEvalTargetUserId; });

            document.getElementById('profile-eval-target-name').textContent = targetUser ? (targetUser.username || '用户') : '用户';
            document.getElementById('profile-eval-target-badge').textContent = isOrganizer ? '活动组织者' : '参与者';

            var organizingRow = document.getElementById('profile-organizing-score-row');
            if (isOrganizer) {
                organizingRow.style.opacity = '1';
            } else {
                organizingRow.style.opacity = '0.5';
                profileEvalOrganizingScore = 0;
                profileUpdateStarDisplay('profile-eval-organizing-stars', 0);
            }

            profileUpdateScorePreview();
        }

        function profileInitStarRating() {
            document.getElementById('profile-eval-skill-stars').addEventListener('click', function(e) {
                if (e.target.classList.contains('star')) {
                    profileEvalSkillScore = parseInt(e.target.dataset.value);
                    profileUpdateStarDisplay('profile-eval-skill-stars', profileEvalSkillScore);
                    profileUpdateScorePreview();
                }
            });

            document.getElementById('profile-eval-organizing-stars').addEventListener('click', function(e) {
                if (e.target.classList.contains('star')) {
                    profileEvalOrganizingScore = parseInt(e.target.dataset.value);
                    profileUpdateStarDisplay('profile-eval-organizing-stars', profileEvalOrganizingScore);
                    profileUpdateScorePreview();
                }
            });

            document.getElementById('profile-evaluation-modal').addEventListener('click', function(e) {
                if (e.target === this) {
                    profileCloseEvaluationModal();
                }
            });
        }

        function profileUpdateStarDisplay(containerId, score) {
            var stars = document.querySelectorAll('#' + containerId + ' .star');
            stars.forEach(function(star) {
                if (parseInt(star.dataset.value) <= score) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        function profileUpdateScorePreview() {
            var preview = document.getElementById('profile-eval-score-preview');
            var parts = [];
            if (profileEvalSkillScore > 0) parts.push('球技 ' + profileEvalSkillScore + '★');
            if (profileEvalOrganizingScore > 0) parts.push('组织 ' + profileEvalOrganizingScore + '★');
            preview.textContent = parts.join('  ');
        }

        function profileCloseEvaluationModal() {
            document.getElementById('profile-evaluation-modal').style.display = 'none';
            profileEvalSkillScore = 0;
            profileEvalOrganizingScore = 0;
            profileEvalTargetUserId = null;
            profileUpdateStarDisplay('profile-eval-skill-stars', 0);
            profileUpdateStarDisplay('profile-eval-organizing-stars', 0);
            document.getElementById('profile-eval-comment').value = '';
            document.getElementById('profile-eval-target-select').value = '';
            document.getElementById('profile-eval-score-preview').textContent = '';
            document.getElementById('profile-organizing-score-row').style.opacity = '1';
        }

        function profileSubmitEvaluation() {
            if (!profileEvalActivity || !profileEvalTargetUserId) {
                alert('请选择评价对象');
                return;
            }
            if (profileEvalSkillScore < 1) {
                alert('请给球技水平打分');
                return;
            }

            var targetOption = document.querySelector('#profile-eval-target-select option[value="' + profileEvalTargetUserId + '"]');
            var isOrganizer = targetOption && targetOption.dataset.isOrganizer === 'true';
            var finalOrganizingScore = isOrganizer ? Math.max(profileEvalOrganizingScore, 1) : 5;

            var comment = document.getElementById('profile-eval-comment').value.trim();

            API.evaluation.submit(profileEvalActivity.id, profileEvalTargetUserId, profileEvalSkillScore, finalOrganizingScore, comment).then(function(res) {
                if (res.code === 200) {
                    showToast('评价成功！', 'success');
                    profileCloseEvaluationModal();
                } else {
                    showToast(res.message || '评价失败', 'error');
                }
            }).catch(function() {
                showToast('网络错误', 'error');
            });
        }

        function saveProfile() {
            if (!currentProfileUser) return;

            var updated = {
                username: currentProfileUser.username,
                phone: document.getElementById('set-phone').value,
                favoriteSport: getFavoriteFromCheckboxes(),
                description: document.getElementById('set-description').value
            };

            var btn = document.querySelector('#settings-tab .btn-primary');
            btn.disabled = true;
            btn.textContent = '保存中...';

            API.user.update(updated).then(function(res) {
                btn.disabled = false;
                btn.textContent = '保存修改';
                if (res.code === 200) {
                    setCurrentUser(res.data);
                    currentProfileUser = res.data;
                    document.getElementById('profile-name').textContent = res.data.username || '未知';
                    document.getElementById('profile-favorite').textContent = '喜好：' + sportLabel(res.data.favoriteSport);
                    setFavoriteCheckboxes(res.data.favoriteSport);
                    showToast('保存成功！', 'success');
                } else {
                    showToast(res.message || '保存失败', 'error');
                }
            }).catch(function() {
                btn.disabled = false;
                btn.textContent = '保存修改';
                showToast('网络错误', 'error');
            });
        }

        function logout() {
            if (!confirm('确定要退出登录吗？')) return;
            API.user.logout().then(function() {
                setCurrentUser(null);
                window.location.href = 'index.html';
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            initSportCheckboxes();
            loadProfile();
        });
    </script>
</body>
</html>
