<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动详情 - 西校区篮球场3v3组队</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .activity-header {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 32px;
            margin: 32px 0;
        }

        .activity-main-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 12px;
        }

        .activity-info-card {
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 88px;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 20px;
        }

        .info-item i {
            color: var(--airbnb-red);
            font-size: 18px;
            margin-top: 2px;
            min-width: 20px;
        }

        .info-content h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .info-content p {
            color: var(--airbnb-gray);
            font-size: 14px;
        }

        .participant-list {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 16px 0;
        }

        .participant-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--airbnb-bg);
            border: 1px solid var(--airbnb-border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .participant-avatar.organizer::after {
            content: '组织者';
            position: absolute;
            bottom: -20px;
            font-size: 12px;
            color: var(--airbnb-red);
            white-space: nowrap;
        }

        .activity-description {
            margin: 32px 0;
            line-height: 1.8;
            color: var(--airbnb-dark);
        }

        .review-section {
            margin-top: 48px;
        }

        .review-card {
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .review-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .review-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .review-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--airbnb-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .review-rating {
            color: #f59e0b;
        }

        .evaluation-form {
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .evaluation-form h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .score-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .score-row label {
            min-width: 80px;
            font-weight: 500;
        }

        .star-rating {
            display: flex;
            gap: 4px;
        }

        .star-rating .star {
            font-size: 24px;
            cursor: pointer;
            color: #d1d5db;
            transition: color 0.2s ease;
        }

        .star-rating .star.active {
            color: #f59e0b;
        }

        .score-display {
            display: flex;
            gap: 4px;
            color: #f59e0b;
        }

        .evaluation-card {
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .evaluation-card .scores {
            display: flex;
            gap: 16px;
            margin: 8px 0;
        }

        .evaluation-card .score-item {
            font-size: 13px;
            color: var(--airbnb-gray);
        }

        .evaluation-card .score-item span {
            color: #f59e0b;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .activity-header {
                grid-template-columns: 1fr;
            }

            .activity-main-image {
                height: 240px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <i class="fa fa-basketball-ball"></i>
                <span>校园约球</span>
            </a>
            
            <div class="search-bar">
                <i class="fa fa-search" style="color: var(--airbnb-gray);"></i>
                <input type="text" placeholder="搜索运动类型、场地、活动...">
            </div>
            
            <div class="nav-right">
                <a href="login.html" class="btn-secondary nav-login" style="padding: 8px 16px; font-size: 14px;">登录</a>
                <a href="register.html" class="btn-primary nav-register" style="padding: 8px 16px; font-size: 14px;">注册</a>
                <a href="create-activity.html" class="btn-primary" style="padding: 8px 16px; font-size: 14px; display: none;">
                    <i class="fa fa-plus mr-1"></i> 发起活动
                </a>
                <div class="notification-icon" style="display: none;">
                    <i class="fa fa-bell"></i>
                    <span class="notification-badge">0</span>
                </div>
                <a href="profile.html" class="user-avatar" style="display: none;">
                    <i class="fa fa-user" style="color: var(--airbnb-gray);"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="container">
        <div style="margin-top: 24px;">
            <a href="index.html" style="color: var(--airbnb-gray); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 16px;">
                <i class="fa fa-arrow-left"></i>
                <span>返回活动列表</span>
            </a>
        </div>

        <h1 style="font-size: 32px; font-weight: 700; margin-bottom: 24px;" id="activity-title">加载中...</h1>

        <div class="activity-header">
            <div>
                <img src="https://picsum.photos/seed/default/1200/800" alt="活动封面" class="activity-main-image" id="activity-cover">
                
                <div class="activity-description" id="activity-desc">
                    <h3 style="font-size: 20px; font-weight: 600; margin-bottom: 16px;">活动介绍</h3>
                    <p>加载中...</p>
                </div>

                <div class="review-section">
                    <h3 style="font-size: 20px; font-weight: 600; margin-bottom: 24px;">活动评价</h3>
                    
                    <div class="evaluation-form" id="evaluation-form-area" style="display:none;">
                        <h3>评价参与者</h3>
                        <div style="margin-bottom: 16px;">
                            <label style="font-weight: 500; display: block; margin-bottom: 8px;">选择要评价的用户</label>
                            <select id="target-user-select" class="form-input" style="width:100%;">
                                <option value="">请选择...</option>
                            </select>
                        </div>
                        <div class="score-row">
                            <label>球技评分</label>
                            <div class="star-rating" id="skill-stars">
                                <span class="star" data-value="1">★</span>
                                <span class="star" data-value="2">★</span>
                                <span class="star" data-value="3">★</span>
                                <span class="star" data-value="4">★</span>
                                <span class="star" data-value="5">★</span>
                            </div>
                        </div>
                        <div class="score-row">
                            <label>组织能力</label>
                            <div class="star-rating" id="organizing-stars">
                                <span class="star" data-value="1">★</span>
                                <span class="star" data-value="2">★</span>
                                <span class="star" data-value="3">★</span>
                                <span class="star" data-value="4">★</span>
                                <span class="star" data-value="5">★</span>
                            </div>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-weight: 500; display: block; margin-bottom: 8px;">评价内容（可选）</label>
                            <textarea id="evaluation-comment" class="form-input" rows="3" placeholder="说说你的评价..."></textarea>
                        </div>
                        <button class="btn-primary" onclick="submitEvaluation()" style="padding: 10px 24px;">
                            提交评价
                        </button>
                    </div>

                    <div id="review-list">
                        <div class="empty-state">
                            <i class="fa fa-spinner fa-spin"></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="activity-info-card">
                <div style="font-size: 24px; font-weight: 700; margin-bottom: 24px;">活动信息</div>

                <div class="info-item">
                    <i class="fa fa-calendar"></i>
                    <div class="info-content">
                        <h4>活动时间</h4>
                        <p id="info-time">加载中...</p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa fa-map-marker"></i>
                    <div class="info-content">
                        <h4>活动地点</h4>
                        <p id="info-location">加载中...</p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa fa-basketball-ball"></i>
                    <div class="info-content">
                        <h4>运动类型</h4>
                        <p id="info-sport">加载中...</p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa fa-users"></i>
                    <div class="info-content">
                        <h4>参与人员</h4>
                        <div class="participant-list" id="participant-list">
                            <p style="font-size: 14px; color: var(--airbnb-gray);">加载中...</p>
                        </div>
                        <p style="color: var(--airbnb-teal); font-size: 14px; font-weight: 500;" id="info-slots"></p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa fa-user"></i>
                    <div class="info-content">
                        <h4>组织者</h4>
                        <p id="info-organizer">加载中...</p>
                    </div>
                </div>

                <button class="btn-primary" style="width: 100%; margin-top: 24px;" id="btn-join" onclick="handleJoin()">
                    立即加入活动
                </button>

                <button class="btn-secondary" style="width: 100%; margin-top: 12px;" id="btn-quit" onclick="handleQuit()" style="display:none;">
                    退出活动
                </button>

                <button class="btn-secondary" style="width: 100%; margin-top: 12px;" onclick="shareActivity()">
                    <i class="fa fa-share-alt mr-2"></i> 推荐给好友
                </button>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer>
        <div class="container footer-content">
            <p>© 2025 校园约球平台 · 让运动更简单</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        var currentActivity = null;
        var skillScore = 0;
        var organizingScore = 0;

        function getActivityId() {
            var params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function loadActivity() {
            var id = getActivityId();
            if (!id) {
                showToast('活动ID不存在', 'error');
                return;
            }

            API.activity.detail(id).then(function(res) {
                if (res.code === 200 && res.data) {
                    currentActivity = res.data;
                    renderActivity(currentActivity);
                    loadEvaluations();
                    loadParticipants();
                } else {
                    document.getElementById('activity-title').textContent = '活动不存在';
                    showToast(res.message || '活动不存在', 'error');
                }
            }).catch(function() {
                document.getElementById('activity-title').textContent = '加载失败';
                showToast('网络错误，请检查后端服务', 'error');
            });
        }

        function loadParticipants() {
            if (!currentActivity) return;
            API.activity.participants(currentActivity.id).then(function(res) {
                if (res.code === 200 && res.data && res.data.length > 0) {
                    var user = getCurrentUser();
                    var select = document.getElementById('target-user-select');
                    var options = '<option value="">请选择...</option>';
                    var hasTarget = false;
                    
                    res.data.forEach(function(p) {
                        if (user && p.userId !== user.id) {
                            options += '<option value="' + p.userId + '">' + (p.username || '用户' + p.userId) + '</option>';
                            hasTarget = true;
                        }
                    });
                    
                    select.innerHTML = options;
                    
                    if (user && hasTarget && currentActivity) {
                        document.getElementById('evaluation-form-area').style.display = 'block';
                    }
                }
            }).catch(function() {});
        }

        function loadEvaluations() {
            if (!currentActivity) return;
            API.evaluation.getByActivity(currentActivity.id).then(function(res) {
                var listEl = document.getElementById('review-list');
                if (res.code === 200 && res.data && res.data.length > 0) {
                    var html = '';
                    res.data.forEach(function(e) {
                        html += '<div class="evaluation-card">' +
                            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">' +
                            '<div style="display:flex;align-items:center;gap:12px;">' +
                            '<div class="review-avatar"><i class="fa fa-user" style="color:var(--airbnb-gray);"></i></div>' +
                            '<div>' +
                            '<div style="font-weight:600;">' + (e.evaluatorName || '匿名') + '</div>' +
                            '<div style="font-size:13px;color:var(--airbnb-gray);">评价了 ' + (e.targetUserName || '用户') + '</div>' +
                            '</div>' +
                            '</div>' +
                            '<div style="color:var(--airbnb-gray);font-size:12px;">' + (e.createTime ? new Date(e.createTime).toLocaleDateString('zh-CN') : '') + '</div>' +
                            '</div>' +
                            '<div class="scores">' +
                            '<div class="score-item">球技：' + renderStars(e.skillScore) + '</div>' +
                            '<div class="score-item">组织能力：' + renderStars(e.organizingScore) + '</div>' +
                            '</div>' +
                            (e.comment ? '<p style="color:var(--airbnb-dark);line-height:1.6;">' + e.comment + '</p>' : '') +
                            '</div>';
                    });
                    listEl.innerHTML = html;
                } else {
                    listEl.innerHTML = '<div class="empty-state"><i class="fa fa-inbox"></i><p>暂无评价</p></div>';
                }
            }).catch(function() {
                document.getElementById('review-list').innerHTML = '<div class="empty-state"><i class="fa fa-inbox"></i><p>暂无评价</p></div>';
            });
        }

        function renderStars(score) {
            var html = '<span class="score-display">';
            for (var i = 1; i <= 5; i++) {
                html += '<i class="fa fa-star' + (i <= score ? '' : '-o') + '" style="font-size:14px;"></i>';
            }
            html += '</span>';
            return html;
        }

        function initStarRating() {
            document.getElementById('skill-stars').addEventListener('click', function(e) {
                if (e.target.classList.contains('star')) {
                    skillScore = parseInt(e.target.dataset.value);
                    updateStarDisplay('skill-stars', skillScore);
                }
            });
            
            document.getElementById('organizing-stars').addEventListener('click', function(e) {
                if (e.target.classList.contains('star')) {
                    organizingScore = parseInt(e.target.dataset.value);
                    updateStarDisplay('organizing-stars', organizingScore);
                }
            });
        }

        function updateStarDisplay(containerId, score) {
            var stars = document.querySelectorAll('#' + containerId + ' .star');
            stars.forEach(function(star) {
                if (parseInt(star.dataset.value) <= score) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        function submitEvaluation() {
            if (!currentActivity) return;
            var targetUserId = document.getElementById('target-user-select').value;
            if (!targetUserId) {
                alert('请选择要评价的用户');
                return;
            }
            if (skillScore < 1) {
                alert('请选择球技评分');
                return;
            }
            if (organizingScore < 1) {
                alert('请选择组织能力评分');
                return;
            }
            
            var comment = document.getElementById('evaluation-comment').value.trim();
            
            API.evaluation.submit(currentActivity.id, targetUserId, skillScore, organizingScore, comment).then(function(res) {
                if (res.code === 200) {
                    showToast('评价成功！', 'success');
                    document.getElementById('evaluation-comment').value = '';
                    skillScore = 0;
                    organizingScore = 0;
                    updateStarDisplay('skill-stars', 0);
                    updateStarDisplay('organizing-stars', 0);
                    document.getElementById('target-user-select').value = '';
                    loadEvaluations();
                } else {
                    showToast(res.message || '评价失败', 'error');
                }
            }).catch(function() {
                showToast('网络错误', 'error');
            });
        }

        function renderActivity(a) {
            document.getElementById('activity-title').textContent = a.title || '未命名活动';
            document.getElementById('activity-cover').src = a.coverImage || 'https://picsum.photos/seed/activity' + a.id + '/1200/800';
            document.getElementById('activity-desc').innerHTML = '<h3 style="font-size: 20px; font-weight: 600; margin-bottom: 16px;">活动介绍</h3><p>' + (a.description || '暂无活动介绍') + '</p>';
            document.getElementById('info-time').textContent = formatDateRange(a.startTime, a.endTime);
            document.getElementById('info-location').textContent = a.venueName || '未知场地';
            document.getElementById('info-sport').textContent = sportLabel(a.sportType);
            document.getElementById('info-organizer').textContent = a.organizerName || '未知';

            var current = a.currentParticipants || 0;
            var max = a.maxParticipants || 0;
            var remaining = max - current;

            if (remaining > 0) {
                document.getElementById('info-slots').textContent = '还差' + remaining + '人，快加入吧！';
            } else {
                document.getElementById('info-slots').textContent = '已满员';
                document.getElementById('info-slots').style.color = 'var(--airbnb-red)';
            }

            var pList = document.getElementById('participant-list');
            var html = '';
            for (var i = 0; i < current; i++) {
                html += '<div class="participant-avatar' + (i === 0 ? ' organizer' : '') + '"><i class="fa fa-user" style="color: var(--airbnb-gray);"></i></div>';
            }
            for (var j = 0; j < remaining; j++) {
                html += '<div class="participant-avatar" style="border-style: dashed;"><i class="fa fa-user-plus" style="color: var(--airbnb-border);"></i></div>';
            }
            pList.innerHTML = html;

            var joinBtn = document.getElementById('btn-join');
            var quitBtn = document.getElementById('btn-quit');
            if (remaining <= 0) {
                joinBtn.textContent = '已满员';
                joinBtn.disabled = true;
            }
        }

        function handleJoin() {
            if (!currentActivity) return;
            var user = getCurrentUser();
            if (!user) {
                window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
                return;
            }
            var btn = document.getElementById('btn-join');
            btn.disabled = true;
            btn.textContent = '加入中...';
            API.activity.join(currentActivity.id).then(function(res) {
                btn.disabled = false;
                btn.textContent = '立即加入活动';
                if (res.code === 200) {
                    showToast('加入成功！', 'success');
                    loadActivity();
                } else {
                    showToast(res.message || '加入失败', 'error');
                }
            }).catch(function() {
                btn.disabled = false;
                btn.textContent = '立即加入活动';
                showToast('网络错误', 'error');
            });
        }

        function handleQuit() {
            if (!currentActivity) return;
            if (!confirm('确定要退出这个活动吗？')) return;
            API.activity.quit(currentActivity.id).then(function(res) {
                if (res.code === 200) {
                    showToast('已退出活动', 'success');
                    loadActivity();
                } else {
                    showToast(res.message || '退出失败', 'error');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            initStarRating();
            loadActivity();
        });
    </script>
</body>
</html>
