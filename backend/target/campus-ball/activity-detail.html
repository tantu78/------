<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动详情 - 西校区篮球场3v3组队</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .activity-header {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 32px;
            margin: 32px 0;
        }

        .activity-main-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 12px;
        }

        .activity-info-card {
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 88px;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 20px;
        }

        .info-item i {
            color: var(--airbnb-red);
            font-size: 18px;
            margin-top: 2px;
            min-width: 20px;
        }

        .info-content h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .info-content p {
            color: var(--airbnb-gray);
            font-size: 14px;
        }

        .participant-list {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 16px 0;
        }

        .participant-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--airbnb-bg);
            border: 1px solid var(--airbnb-border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .participant-avatar.organizer::after {
            content: '组织者';
            position: absolute;
            bottom: -20px;
            font-size: 12px;
            color: var(--airbnb-red);
            white-space: nowrap;
        }

        .activity-description {
            margin: 32px 0;
            line-height: 1.8;
            color: var(--airbnb-dark);
        }

        .review-section {
            margin-top: 48px;
        }

        .review-card {
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .review-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .review-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .review-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--airbnb-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .review-rating {
            color: #f59e0b;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--airbnb-border);
            border-radius: 10px;
            font-size: 14px;
            color: var(--airbnb-dark);
            background: #fff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            resize: vertical;
        }

        .form-input:focus {
            border-color: var(--airbnb-red);
            box-shadow: 0 0 0 3px rgba(255, 90, 95, 0.12);
        }

        .evaluation-form {
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .evaluation-form h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .score-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .score-row label {
            min-width: 80px;
            font-weight: 500;
            font-size: 15px;
        }

        .star-rating {
            display: flex;
            gap: 6px;
        }

        .star-rating .star {
            font-size: 32px;
            cursor: pointer;
            color: #d1d5db;
            transition: color 0.15s ease, transform 0.15s ease;
            user-select: none;
        }

        .star-rating .star:hover {
            transform: scale(1.15);
        }

        .star-rating .star.active {
            color: #f59e0b;
        }

        .score-display {
            display: flex;
            gap: 4px;
            color: #f59e0b;
        }

        .evaluation-card {
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .evaluation-card .scores {
            display: flex;
            gap: 16px;
            margin: 8px 0;
        }

        .evaluation-card .score-item {
            font-size: 13px;
            color: var(--airbnb-gray);
        }

        .evaluation-card .score-item span {
            color: #f59e0b;
            font-weight: 600;
        }

        .btn-evaluate {
            padding: 12px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.25);
        }

        .btn-evaluate:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.4);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }

        .modal-overlay.closing {
            animation: fadeOut 0.2s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .modal-dialog {
            background: #fff;
            border-radius: 20px;
            padding: 0;
            width: 480px;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-dialog.closing {
            animation: slideDown 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes slideDown {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(30px); opacity: 0; }
        }

        .modal-header {
            padding: 28px 32px 0;
        }

        .modal-header h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--airbnb-dark);
        }

        .modal-header .modal-subtitle {
            font-size: 14px;
            color: var(--airbnb-gray);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-body {
            padding: 24px 32px;
        }

        .modal-footer {
            padding: 0 32px 28px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-footer button {
            padding: 10px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-cancel {
            background: var(--airbnb-bg);
            color: var(--airbnb-dark);
        }

        .btn-cancel:hover {
            background: #e5e7eb;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--airbnb-red) 0%, var(--airbnb-orange) 100%);
            color: white;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .evaluation-target {
            background: var(--airbnb-bg);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .evaluation-target .target-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--airbnb-red), var(--airbnb-orange));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .evaluation-target .target-name {
            font-weight: 600;
            font-size: 15px;
        }

        .evaluation-target .target-badge {
            font-size: 12px;
            color: var(--airbnb-red);
            background: rgba(255, 90, 95, 0.1);
            padding: 2px 10px;
            border-radius: 20px;
        }

        .score-preview {
            font-size: 14px;
            color: #f59e0b;
            margin-left: auto;
            min-width: 100px;
            text-align: right;
        }

        @media (max-width: 768px) {
            .activity-header {
                grid-template-columns: 1fr;
            }

            .activity-main-image {
                height: 240px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="container nav-content">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    <i class="fa fa-basketball-ball"></i>
                    <span>校园约球</span>
                </a>
                <div class="nav-sport-tabs">
                    <a href="index.html" class="nav-sport-item">全部</a>

                    <a href="index.html?type=badminton" class="nav-sport-item">羽毛球</a>

                </a>

    </nav>

    <!-- 主内容区 -->
    <main class="container">
        <div style="margin-top: 24px;">
            <a href="index.html" style="color: var(--airbnb-gray); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 16px;">
                <i class="fa fa-arrow-left"></i>
                <span>返回活动列表</span>
            </a>
        </div>

        <h1 style="font-size: 32px; font-weight: 700; margin-bottom: 24px;" id="activity-title">加载中...</h1>

        <div class="activity-header">
            <div>
                <img src="https://picsum.photos/seed/default/1200/800" alt="活动封面" class="activity-main-image" id="activity-cover">
                
                <div class="activity-description" id="activity-desc">
                    <h3 style="font-size: 20px; font-weight: 600; margin-bottom: 16px;">活动介绍</h3>
                    <p>加载中...</p>
                </div>

                <div class="review-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <h3 style="font-size: 20px; font-weight: 600; margin: 0;">活动评价</h3>
                        <button class="btn-evaluate" id="btn-evaluate" onclick="openEvaluationModal()" style="display:none;">
                            <i class="fa fa-star"></i> 评价组织者
                        </button>
                    </div>

                    <div id="review-list">
                        <div class="empty-state">
                            <i class="fa fa-spinner fa-spin"></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="activity-info-card">
                <div style="font-size: 24px; font-weight: 700; margin-bottom: 24px;">活动信息</div>

                <div class="info-item">
                    <i class="fa fa-calendar"></i>
                    <div class="info-content">
                        <h4>活动时间</h4>
                        <p id="info-time">加载中...</p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa fa-map-marker"></i>
                    <div class="info-content">
                        <h4>活动地点</h4>
                        <p id="info-location">加载中...</p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa fa-basketball-ball"></i>
                    <div class="info-content">
                        <h4>运动类型</h4>
                        <p id="info-sport">加载中...</p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa fa-users"></i>
                    <div class="info-content">
                        <h4>参与人员</h4>
                        <div class="participant-list" id="participant-list">
                            <p style="font-size: 14px; color: var(--airbnb-gray);">加载中...</p>
                        </div>
                        <p style="color: var(--airbnb-teal); font-size: 14px; font-weight: 500;" id="info-slots"></p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa fa-user"></i>
                    <div class="info-content">
                        <h4>组织者</h4>
                        <p id="info-organizer">加载中...</p>
                    </div>
                </div>

                <button class="btn-primary" style="width: 100%; margin-top: 24px;" id="btn-join" onclick="handleJoin()">
                    立即加入活动
                </button>

                <button class="btn-secondary" style="width: 100%; margin-top: 12px;" id="btn-quit" onclick="handleQuit()" style="display:none;">
                    退出活动
                </button>

                <button class="btn-secondary" style="width: 100%; margin-top: 12px;" onclick="shareActivity()">

    </main>

    <!-- 页脚 -->
    <footer>
        <div class="container footer-content">
            <p>© 2025 校园约球平台 · 让运动更简单</p>
        </div>
    </footer>

    <div class="modal-overlay" id="evaluation-modal" style="display:none;">
        <div class="modal-dialog">
            <div class="modal-header">
                <h2>评价组织者</h2>
                <div class="modal-subtitle">
                    <i class="fa fa-star" style="color:#f59e0b;"></i> 你的评价将展示在活动详情中
                </div>
            </div>
            <div class="modal-body">
                <div class="evaluation-target">
                    <div class="target-avatar">
                        <i class="fa fa-user"></i>
                    </div>
                    <div>
                        <div class="target-name" id="eval-organizer-name">组织者</div>
                        <div class="target-badge">活动组织者</div>
                    </div>
                    <div class="score-preview" id="eval-score-preview"></div>
                </div>

                <div class="score-row">
                    <label>球技水平</label>
                    <div class="star-rating" id="eval-skill-stars">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>
                </div>

                <div class="score-row">
                    <label>组织能力</label>
                    <div class="star-rating" id="eval-organizing-stars">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>
                </div>

                <div style="margin-top: 4px;">
                    <label style="font-weight: 500; display: block; margin-bottom: 8px; font-size: 15px;">评价内容</label>
                    <textarea id="eval-comment" class="form-input" rows="3" placeholder="说说你对这次活动和组织者的感受..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeEvaluationModal()">取消</button>
                <button class="btn-submit" onclick="submitEvaluation()">提交评价</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        var currentActivity = null;
        var evalSkillScore = 0;
        var evalOrganizingScore = 0;

        function getActivityId() {
            var params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function loadActivity() {
            var id = getActivityId();
            if (!id) {
                showToast('活动ID不存在', 'error');
                return;
            }

            API.activity.detail(id).then(function(res) {
                if (res.code === 200 && res.data) {
                    currentActivity = res.data;
                    renderActivity(currentActivity);
                    loadEvaluations();
                    updateEvaluateButton();
                } else {
                    document.getElementById('activity-title').textContent = '活动不存在';
                    showToast(res.message || '活动不存在', 'error');
                }
            }).catch(function() {
                document.getElementById('activity-title').textContent = '加载失败';
                showToast('网络错误，请检查后端服务', 'error');
            });
        }

        function updateEvaluateButton() {
            if (!currentActivity) return;
            var user = getCurrentUser();
            if (!user) return;
            if (user.id === currentActivity.organizerId) return;
            document.getElementById('btn-evaluate').style.display = 'inline-flex';
        }

        function openEvaluationModal() {
            if (!currentActivity) return;
            document.getElementById('eval-organizer-name').textContent = currentActivity.organizerName || '组织者';
            evalSkillScore = 0;
            evalOrganizingScore = 0;
            updateStarDisplay('eval-skill-stars', 0);
            updateStarDisplay('eval-organizing-stars', 0);
            document.getElementById('eval-comment').value = '';
            document.getElementById('eval-score-preview').textContent = '';
            document.getElementById('evaluation-modal').style.display = 'flex';
        }

        function closeEvaluationModal() {
            var overlay = document.getElementById('evaluation-modal');
            var dialog = overlay.querySelector('.modal-dialog');
            overlay.classList.add('closing');
            dialog.classList.add('closing');
            setTimeout(function() {
                overlay.style.display = 'none';
                overlay.classList.remove('closing');
                dialog.classList.remove('closing');
            }, 200);
        }

        function loadEvaluations() {
            if (!currentActivity) return;
            API.evaluation.getByActivity(currentActivity.id).then(function(res) {
                var listEl = document.getElementById('review-list');
                if (res.code === 200 && res.data && res.data.length > 0) {
                    var html = '';
                    res.data.forEach(function(e) {
                        html += '<div class="evaluation-card">' +
                            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">' +
                            '<div style="display:flex;align-items:center;gap:12px;">' +
                            '<div class="review-avatar"><i class="fa fa-user" style="color:var(--airbnb-gray);"></i></div>' +
                            '<div>' +
                            '<div style="font-weight:600;">' + (e.evaluatorName || '匿名') + '</div>' +
                            '<div style="font-size:13px;color:var(--airbnb-gray);">评价了 ' + (e.targetUserName || '用户') + '</div>' +
                            '</div>' +
                            '</div>' +
                            '<div style="color:var(--airbnb-gray);font-size:12px;">' + (e.createTime ? new Date(e.createTime).toLocaleDateString('zh-CN') : '') + '</div>' +
                            '</div>' +
                            '<div class="scores">' +
                            '<div class="score-item">球技：' + renderStars(e.skillScore) + '</div>' +
                            '<div class="score-item">组织能力：' + renderStars(e.organizingScore) + '</div>' +
                            '</div>' +
                            (e.comment ? '<p style="color:var(--airbnb-dark);line-height:1.6;">' + e.comment + '</p>' : '') +
                            '</div>';
                    });
                    listEl.innerHTML = html;
                } else {
                    listEl.innerHTML = '<div class="empty-state"><i class="fa fa-inbox"></i><p>暂无评价</p></div>';
                }
            }).catch(function() {
                document.getElementById('review-list').innerHTML = '<div class="empty-state"><i class="fa fa-inbox"></i><p>暂无评价</p></div>';
            });
        }

        function renderStars(score) {
            var html = '<span class="score-display">';
            for (var i = 1; i <= 5; i++) {
                html += '<i class="fa fa-star' + (i <= score ? '' : '-o') + '" style="font-size:14px;"></i>';
            }
            html += '</span>';
            return html;
        }

        function initStarRating() {
            document.getElementById('eval-skill-stars').addEventListener('click', function(e) {
                if (e.target.classList.contains('star')) {
                    evalSkillScore = parseInt(e.target.dataset.value);
                    updateStarDisplay('eval-skill-stars', evalSkillScore);
                    updateScorePreview();
                }
            });

            document.getElementById('eval-organizing-stars').addEventListener('click', function(e) {
                if (e.target.classList.contains('star')) {
                    evalOrganizingScore = parseInt(e.target.dataset.value);
                    updateStarDisplay('eval-organizing-stars', evalOrganizingScore);
                    updateScorePreview();
                }
            });

            document.getElementById('evaluation-modal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeEvaluationModal();
                }
            });
        }

        function updateStarDisplay(containerId, score) {
            var stars = document.querySelectorAll('#' + containerId + ' .star');
            stars.forEach(function(star) {
                if (parseInt(star.dataset.value) <= score) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        function updateScorePreview() {
            var preview = document.getElementById('eval-score-preview');
            var parts = [];
            if (evalSkillScore > 0) parts.push('球技 ' + evalSkillScore + '★');
            if (evalOrganizingScore > 0) parts.push('组织 ' + evalOrganizingScore + '★');
            preview.textContent = parts.join('  ');
        }

        function submitEvaluation() {
            if (!currentActivity) return;
            if (evalSkillScore < 1) {
                alert('请给球技水平打分');
                return;
            }
            if (evalOrganizingScore < 1) {
                alert('请给组织能力打分');
                return;
            }

            var comment = document.getElementById('eval-comment').value.trim();

            API.evaluation.submit(currentActivity.id, currentActivity.organizerId, evalSkillScore, evalOrganizingScore, comment).then(function(res) {
                if (res.code === 200) {
                    showToast('评价成功！', 'success');
                    closeEvaluationModal();
                    loadEvaluations();
                } else {
                    showToast(res.message || '评价失败', 'error');
                }
            }).catch(function() {
                showToast('网络错误', 'error');
            });
        }

        function renderActivity(a) {
            document.getElementById('activity-title').textContent = a.title || '未命名活动';
            document.getElementById('activity-cover').src = a.coverImage || 'https://picsum.photos/seed/activity' + a.id + '/1200/800';
            document.getElementById('activity-desc').innerHTML = '<h3 style="font-size: 20px; font-weight: 600; margin-bottom: 16px;">活动介绍</h3><p>' + (a.description || '暂无活动介绍') + '</p>';
            document.getElementById('info-time').textContent = formatDateRange(a.startTime, a.endTime);
            document.getElementById('info-location').textContent = a.venueName || '未知场地';
            document.getElementById('info-sport').textContent = sportLabel(a.sportType);
            document.getElementById('info-organizer').textContent = a.organizerName || '未知';

            var current = a.currentParticipants || 0;
            var max = a.maxParticipants || 0;
            var remaining = max - current;

            if (remaining > 0) {
                document.getElementById('info-slots').textContent = '还差' + remaining + '人，快加入吧！';
            } else {
                document.getElementById('info-slots').textContent = '已满员';
                document.getElementById('info-slots').style.color = 'var(--airbnb-red)';
            }

            var pList = document.getElementById('participant-list');
            var html = '';
            for (var i = 0; i < current; i++) {
                html += '<div class="participant-avatar' + (i === 0 ? ' organizer' : '') + '"><i class="fa fa-user" style="color: var(--airbnb-gray);"></i></div>';
            }
            for (var j = 0; j < remaining; j++) {
                html += '<div class="participant-avatar" style="border-style: dashed;"><i class="fa fa-user-plus" style="color: var(--airbnb-border);"></i></div>';
            }
            pList.innerHTML = html;

            var joinBtn = document.getElementById('btn-join');
            var quitBtn = document.getElementById('btn-quit');
            if (remaining <= 0) {
                joinBtn.textContent = '已满员';
                joinBtn.disabled = true;
            }
        }

        function handleJoin() {
            if (!currentActivity) return;
            var user = getCurrentUser();
            if (!user) {
                window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
                return;
            }
            var btn = document.getElementById('btn-join');
            btn.disabled = true;
            btn.textContent = '加入中...';
            API.activity.join(currentActivity.id).then(function(res) {
                btn.disabled = false;
                btn.textContent = '立即加入活动';
                if (res.code === 200) {
                    showToast('加入成功！', 'success');
                    loadActivity();
                } else {
                    showToast(res.message || '加入失败', 'error');
                }
            }).catch(function() {
                btn.disabled = false;
                btn.textContent = '立即加入活动';
                showToast('网络错误', 'error');
            });
        }

        function handleQuit() {
            if (!currentActivity) return;
            if (!confirm('确定要退出这个活动吗？')) return;
            API.activity.quit(currentActivity.id).then(function(res) {
                if (res.code === 200) {
                    showToast('已退出活动', 'success');
                    loadActivity();
                } else {
                    showToast(res.message || '退出失败', 'error');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            initStarRating();
            loadActivity();
        });
    </script>
</body>
</html>
