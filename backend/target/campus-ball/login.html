<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 校园约球平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 64px - 208px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--airbnb-red);
        }

        .auth-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .auth-links a {
            color: var(--airbnb-red);
            text-decoration: none;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--airbnb-gray);
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
            color: var(--airbnb-gray);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: var(--airbnb-border);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-btn {
            width: 48px;
            height: 48px;
            border: 1px solid var(--airbnb-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .social-btn:hover {
            background: var(--airbnb-bg);
            border-color: var(--airbnb-gray);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <i class="fa fa-basketball-ball"></i>
                <span>校园约球</span>
            </a>
            
            <div class="nav-right">
                <a href="register.html" class="btn-secondary" style="padding: 8px 16px; font-size: 14px;">
                    注册
                </a>
            </div>
        </div>
    </nav>

    <!-- 登录内容 -->
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">登录账号</h2>
            
            <form>
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                </div>

                <div class="auth-links">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>记住我</span>
                    </label>
                    <a href="#">忘记密码？</a>
                </div>

                <button type="button" class="btn-primary" style="width: 100%;" onclick="login()">
                    登录
                </button>
            </form>

            <div class="divider">其他登录方式</div>

            <div class="social-login">
                <button class="social-btn">
                    <i class="fa fa-weixin" style="color: #07c160; font-size: 20px;"></i>
                </button>
                <button class="social-btn">
                    <i class="fa fa-qq" style="color: #12b7f5; font-size: 20px;"></i>
                </button>
                <button class="social-btn">
                    <i class="fa fa-weibo" style="color: #e6162d; font-size: 20px;"></i>
                </button>
            </div>

            <div style="text-align: center; margin-top: 24px; font-size: 14px;">
                还没有账号？ <a href="register.html" style="color: var(--airbnb-red); text-decoration: none;">立即注册</a>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="container footer-content">
            <p>© 2025 校园约球平台 · 让运动更简单</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        function getRedirectUrl() {
            var params = new URLSearchParams(window.location.search);
            return params.get('redirect') || 'index.html';
        }

        function login() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            
            if (!username || !password) {
                showToast('请输入用户名和密码', 'error');
                return;
            }
            
            var btn = document.querySelector('button[onclick="login()"]');
            btn.disabled = true;
            btn.textContent = '登录中...';
            
            API.user.login(username, password).then(function(res) {
                btn.disabled = false;
                btn.textContent = '登录';
                if (res.code === 200) {
                    setCurrentUser(res.data);
                    showToast('登录成功！', 'success');
                    setTimeout(function() {
                        window.location.href = getRedirectUrl();
                    }, 500);
                } else {
                    showToast(res.message || '登录失败', 'error');
                }
            }).catch(function() {
                btn.disabled = false;
                btn.textContent = '登录';
                showToast('网络错误，请稍后重试', 'error');
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('password').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') login();
            });
        });
    </script>
</body>
</html>
