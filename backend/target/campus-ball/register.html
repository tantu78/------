<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 校园约球平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 64px - 208px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 480px;
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--airbnb-red);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        .auth-links {
            margin-bottom: 24px;
            font-size: 14px;
        }

        .auth-links a {
            color: var(--airbnb-red);
            text-decoration: none;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .agreement {
            font-size: 12px;
            color: var(--airbnb-gray);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .agreement a {
            color: var(--airbnb-red);
            text-decoration: none;
        }

        .sport-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sport-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border: 1px solid var(--airbnb-border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            user-select: none;
        }

        .sport-checkbox:hover {
            border-color: var(--airbnb-red);
            background: rgba(255, 90, 95, 0.03);
        }

        .sport-checkbox input {
            display: none;
        }

        .sport-checkbox.selected {
            border-color: var(--airbnb-red);
            background: rgba(255, 90, 95, 0.08);
            color: var(--airbnb-red);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <i class="fa fa-basketball-ball"></i>
                <span>校园约球</span>
            </a>
            
            <div class="nav-right">
                <a href="login.html" class="btn-secondary" style="padding: 8px 16px; font-size: 14px;">
                    登录
                </a>
            </div>
        </div>
    </nav>

    <!-- 注册内容 -->
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">注册账号</h2>
            
            <form>
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请设置用户名" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="password">密码</label>
                        <input type="password" id="password" class="form-input" placeholder="请设置密码" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="confirm-password">确认密码</label>
                        <input type="password" id="confirm-password" class="form-input" placeholder="请再次输入密码" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">喜好的运动类型（可多选）</label>
                    <div class="sport-checkboxes" id="sport-checkboxes">
                        <label class="sport-checkbox"><input type="checkbox" name="favorite" value="basketball"> <i class="fa fa-basketball-ball"></i> 篮球</label>
                        <label class="sport-checkbox"><input type="checkbox" name="favorite" value="badminton"> <i class="fa fa-table-tennis"></i> 羽毛球</label>
                        <label class="sport-checkbox"><input type="checkbox" name="favorite" value="pingpong"> <i class="fa fa-table-tennis-paddle-ball"></i> 乒乓球</label>
                        <label class="sport-checkbox"><input type="checkbox" name="favorite" value="football"> <i class="fa fa-futbol"></i> 足球</label>
                        <label class="sport-checkbox"><input type="checkbox" name="favorite" value="other"> <i class="fa fa-ellipsis-h"></i> 其他</label>
                    </div>
                    <p style="font-size: 12px; color: var(--airbnb-gray); margin-top: 4px;">我们会根据你的喜好推荐相关活动</p>
                </div>

                <div class="agreement">
                    <label style="display: flex; align-items: flex-start; gap: 6px; cursor: pointer;">
                        <input type="checkbox" required>
                        <span>我已阅读并同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></span>
                    </label>
                </div>

                <button type="button" class="btn-primary" style="width: 100%;" onclick="register()">
                    注册
                </button>
            </form>

            <div style="text-align: center; margin-top: 24px; font-size: 14px;">
                已有账号？ <a href="login.html" style="color: var(--airbnb-red); text-decoration: none;">立即登录</a>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="container footer-content">
            <p>© 2025 校园约球平台 · 让运动更简单</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var boxes = document.querySelectorAll('.sport-checkbox');
            boxes.forEach(function(box) {
                box.addEventListener('click', function() {
                    var cb = this.querySelector('input');
                    cb.checked = !cb.checked;
                    this.classList.toggle('selected', cb.checked);
                });
            });
        });

        function getFavoriteSport() {
            var checked = document.querySelectorAll('input[name="favorite"]:checked');
            var values = [];
            checked.forEach(function(cb) { values.push(cb.value); });
            return values.length > 0 ? values.join(',') : null;
        }

        function register() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirm-password').value;
            
            if (!username || !password || !confirmPassword) {
                showToast('请填写完整信息', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showToast('两次输入的密码不一致', 'error');
                return;
            }
            
            if (password.length < 6) {
                showToast('密码长度至少6位', 'error');
                return;
            }
            
            var btn = document.querySelector('button[onclick="register()"]');
            btn.disabled = true;
            btn.textContent = '注册中...';
            
            var userData = {
                username: username,
                password: password,
                favoriteSport: getFavoriteSport()
            };
            
            API.user.register(userData).then(function(res) {
                btn.disabled = false;
                btn.textContent = '注册';
                if (res.code === 200) {
                    showToast('注册成功，正在自动登录...', 'success');
                    API.user.login(username, password).then(function(loginRes) {
                        if (loginRes.code === 200) {
                            setCurrentUser(loginRes.data);
                            setTimeout(function() {
                                window.location.href = 'index.html';
                            }, 300);
                        } else {
                            window.location.href = 'login.html';
                        }
                    }).catch(function() {
                        window.location.href = 'login.html';
                    });
                } else {
                    showToast(res.message || '注册失败', 'error');
                }
            }).catch(function() {
                btn.disabled = false;
                btn.textContent = '注册';
                showToast('网络错误，请稍后重试', 'error');
            });
        }
    </script>
</body>
</html>
