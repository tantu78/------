<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园约球平台 - 找到身边的球友</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .forum-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        .forum-search {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 12px 16px;
        }

        .forum-search i {
            color: var(--airbnb-gray);
            font-size: 16px;
        }

        .forum-search input {
            flex: 1;
            border: 0;
            outline: 0;
            font-size: 15px;
        }

        .forum-sort {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
        }

        .forum-sort select {
            border: 0;
            outline: 0;
            background: transparent;
            font-size: 14px;
            cursor: pointer;
        }

        .forum-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .forum-card {
            display: flex;
            background: white;
            border: 1px solid var(--airbnb-border);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .forum-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }

        .forum-card-color {
            width: 5px;
            flex-shrink: 0;
        }

        .forum-card-content {
            flex: 1;
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .forum-card-row {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .forum-card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .forum-card-title i {
            font-size: 16px;
            flex-shrink: 0;
        }

        .forum-card-title h3 {
            font-size: 15px;
            font-weight: 600;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .forum-card-tags {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .forum-tag {
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 500;
        }

        .forum-tag.hot {
            background: #FFF3E0;
            color: #FF9800;
        }

        .forum-tag.full {
            background: #FFEBEE;
            color: #F44336;
        }

        .forum-card-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--airbnb-gray);
            flex-shrink: 0;
        }

        .forum-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .forum-meta-item i {
            font-size: 12px;
        }

        .forum-card-desc {
            font-size: 13px;
            color: var(--airbnb-gray);
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            min-width: 0;
        }

        .forum-pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 32px;
        }

        .forum-pagination a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--airbnb-border);
            color: var(--airbnb-dark);
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s ease;
        }

        .forum-pagination a:hover {
            background: var(--airbnb-bg);
        }

        .forum-pagination a.active {
            background: var(--airbnb-red);
            border-color: var(--airbnb-red);
            color: white;
        }

        .forum-pagination a.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .forum-toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .forum-sort {
                justify-content: center;
            }
            .forum-card-meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="container nav-content">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    <i class="fa fa-basketball-ball"></i>
                    <span>校园约球</span>
                </a>
                <div class="nav-sport-tabs">
                    <a href="index.html" class="nav-sport-item active">全部</a>
                    <a href="?type=basketball" class="nav-sport-item">篮球</a>
                    <a href="?type=badminton" class="nav-sport-item">羽毛球</a>
                    <a href="?type=pingpong" class="nav-sport-item">乒乓球</a>
                    <a href="?type=football" class="nav-sport-item">足球</a>
                </div>
            </div>

            <div class="nav-right">
                <a href="map.html" class="btn-secondary" style="padding: 6px 14px; font-size: 13px;">
                    <i class="fa fa-map-marker" style="margin-right:4px;"></i>按位置筛选
                </a>
                <a href="login.html" class="btn-secondary nav-login" style="padding: 6px 14px; font-size: 13px;">登录</a>
                <a href="create-activity.html" class="btn-primary" style="padding: 6px 14px; font-size: 13px; display: none;">
                    <i class="fa fa-plus" style="margin-right:4px;"></i>发起活动
                </a>
                <a href="register.html" class="btn-primary nav-register" style="padding: 6px 14px; font-size: 13px;">注册</a>
                <a href="profile.html" class="user-avatar" style="display: none;">
                    <i class="fa fa-user" style="color: var(--airbnb-gray);"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="container">
        <!-- Hero区域 -->
        <div class="hero">
            <img src="img/跑道.jpg" alt="跑道背景" class="hero-bg">
            <div class="hero-content">
                <div class="hero-text">
                    <h1>找到身边的球友，随时约球</h1>
                    <p>覆盖全校所有运动场地，支持篮球、羽毛球、乒乓球等多种运动</p>
                    <button class="hero-btn">立即找活动</button>
                </div>
                <div class="hero-characters">
                    <img src="img/篮球.jpg" alt="篮球" class="hero-character">
                    <img src="img/羽毛球.jpg" alt="羽毛球" class="hero-character">
                    <img src="img/足球.jpg" alt="足球" class="hero-character">
                </div>
            </div>
        </div>

        <!-- 热门活动 -->
        <h2 class="section-title">近期热门活动</h2>
        <div class="forum-list" id="hot-activities">
            <div class="empty-state" style="grid-column: 1/-1;">
                <i class="fa fa-spinner fa-spin"></i>
                <p>加载中...</p>
            </div>
        </div>

        <!-- 推荐活动 -->
        <h2 class="section-title">根据你的喜好推荐</h2>
        <div class="forum-list" id="recommend-activities">
            <div class="empty-state" style="grid-column: 1/-1;">
                <i class="fa fa-spinner fa-spin"></i>
                <p>加载中...</p>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer>
        <div class="container footer-content">
            <p>© 2025 校园约球平台 · 让运动更简单</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        var currentSportType = null;
        var currentSort = 'latest';
        var currentPage = 0;
        var pageSize = 8;

        function getSportTypeFromUrl() {
            var params = new URLSearchParams(window.location.search);
            var type = params.get('type');
            if (type) {
                currentSportType = type;
                var items = document.querySelectorAll('.nav-sport-item');
                items.forEach(function(item) {
                    var href = item.getAttribute('href');
                    item.classList.toggle('active', href && href.indexOf('type=' + type) !== -1);
                });
            }
        }

        function renderActivities(containerId, activities) {
            var container = document.getElementById(containerId);
            if (!activities || activities.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><i class="fa fa-inbox"></i><p>暂无活动</p></div>';
                return;
            }
            container.innerHTML = activities.map(forumCardHtml).join('');
            container.className = 'forum-list';
        }

        function loadHotActivities() {
            var params = {};
            if (currentSportType) params.sportType = currentSportType;
            params.size = 8;
            API.activity.list(params).then(function(res) {
                if (res.code === 200 && res.data) {
                    var activities = res.data.content || res.data;
                    renderActivities('hot-activities', activities);
                } else {
                    document.getElementById('hot-activities').innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><i class="fa fa-inbox"></i><p>暂无活动</p></div>';
                }
            }).catch(function() {
                document.getElementById('hot-activities').innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><i class="fa fa-exclamation-triangle"></i><p>加载失败，请检查后端服务是否启动</p></div>';
            });
        }

        function loadRecommendActivities() {
            var user = getCurrentUser();
            var container = document.getElementById('recommend-activities');
            if (!user) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1; padding: 60px 20px;"><i class="fa fa-user-lock" style="font-size: 48px; color: var(--airbnb-gray); margin-bottom: 16px;"></i><p style="font-size: 16px; color: var(--airbnb-gray);">登录后查看个性化推荐</p><a href="login.html?redirect=' + encodeURIComponent(window.location.href) + '" class="btn-primary" style="display: inline-block; margin-top: 16px; text-decoration: none;">立即登录</a></div>';
                return;
            }

            API.activity.recommend().then(function(res) {
                if (res.code === 200 && res.data) {
                    renderActivities('recommend-activities', res.data);
                } else {
                    loadHotActivitiesFallback();
                }
            }).catch(function() {
                loadHotActivitiesFallback();
            });
        }

        function loadHotActivitiesFallback() {
            API.activity.list({ size: 4 }).then(function(res) {
                if (res.code === 200 && res.data) {
                    var activities = res.data.content || res.data;
                    renderActivities('recommend-activities', activities);
                } else {
                    document.getElementById('recommend-activities').innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><i class="fa fa-inbox"></i><p>暂无活动</p></div>';
                }
            }).catch(function() {
                document.getElementById('recommend-activities').innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><i class="fa fa-exclamation-triangle"></i><p>加载失败</p></div>';
            });
        }

        function getSportConfig(sportType) {
            var configs = {
                basketball: { color: '#FF385C', icon: 'fa-basketball-ball' },
                badminton: { color: '#00C853', icon: 'fa-table-tennis' },
                pingpong: { color: '#2196F3', icon: 'fa-table-tennis-paddle-ball' },
                football: { color: '#FF9800', icon: 'fa-futbol' }
            };
            return configs[sportType] || { color: '#666', icon: 'fa-futbol-o' };
        }

        function forumCardHtml(activity) {
            var cfg = getSportConfig(activity.sportType);
            var current = activity.currentParticipants || 0;
            var max = activity.maxParticipants || 0;
            var isFull = current >= max;
            var isHot = (activity.evaluationCount || 0) >= 3;

            var tags = [];
            if (isHot) tags.push('<span class="forum-tag hot">🔥 热门</span>');
            if (isFull) tags.push('<span class="forum-tag full">满员</span>');

            var desc = activity.description || '';
            if (desc.length > 60) desc = desc.substring(0, 60) + '...';

            return '<div class="forum-card" onclick="window.location.href=\'activity-detail.html?id=' + activity.id + '\'">' +
                '<div class="forum-card-color" style="background: ' + cfg.color + '"></div>' +
                '<div class="forum-card-content">' +
                    '<div class="forum-card-row">' +
                        '<div class="forum-card-title">' +
                            '<i class="fa ' + cfg.icon + '" style="color:' + cfg.color + '"></i>' +
                            '<h3>' + (activity.title || '未命名活动') + '</h3>' +
                        '</div>' +
                        '<div class="forum-card-tags">' + tags.join('') + '</div>' +
                    '</div>' +
                    '<div class="forum-card-row">' +
                        '<div class="forum-card-meta">' +
                            '<span class="forum-meta-item"><i class="fa fa-user"></i>' + (activity.organizerName || '未知组织者') + '</span>' +
                            '<span class="forum-meta-item"><i class="fa fa-map-marker"></i>' + (activity.venueName || '未知场地') + '</span>' +
                            '<span class="forum-meta-item"><i class="fa fa-clock-o"></i>' + formatDateRange(activity.startTime, activity.endTime) + '</span>' +
                            '<span class="forum-meta-item"><i class="fa fa-users"></i>' + current + '/' + max + '人</span>' +
                        '</div>' +
                    '</div>' +
                    (desc ? '<div class="forum-card-desc">' + desc + '</div>' : '') +
                '</div>' +
            '</div>';
        }

        document.addEventListener('DOMContentLoaded', function() {
            getSportTypeFromUrl();
            loadHotActivities();
            loadRecommendActivities();
        });
    </script>
</body>
</html>
